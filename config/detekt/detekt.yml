build:
  maxIssues: 0
  excludeCorrectable: false

config:
  validation: true
  warningsAsErrors: false

style:
  MagicNumber:
    active: true
    ignoreEnums: true
    ignoreAnnotation: true
    ignoreNumbers: ['-1', '0', '1', '2']
  MaxLineLength:
    active: true
    maxLineLength: 140
    excludePackageStatements: true
    excludeImportStatements: true
  ReturnCount:
    max: 4
  UnusedPrivateMember:
    active: true
    ignoreAnnotated: ['Preview']
  WildcardImport:
    active: true

naming:
  FunctionNaming:
    ignoreAnnotated: ['Composable']
  TopLevelPropertyNaming:
    constantPattern: '[A-Z][A-Za-z0-9]*'

complexity:
  LongMethod:
    threshold: 60
  TooManyFunctions:
    thresholdInFiles: 20

formatting:
  active: false  # ktlint owns formatting

empty-blocks:
  EmptyFunctionBlock:
    ignoreOverridden: true
